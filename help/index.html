<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash Drill</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Cormorant+Garamond:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="noise"></div>
  <main class="app-shell">
    <header class="topbar">
      <h1>Flash Drill</h1>
      <div class="deck-switch" aria-label="Deck selector">
        <button class="deck-toggle is-active" data-deck="memoriter">Memoriter</button>
        <button class="deck-toggle" data-deck="kotelezo">Kötelezők</button>
        <button class="deck-toggle" data-deck="mufajok">Műfajok</button>
      </div>
    </header>

    <section class="stage" aria-live="polite">
      <div class="meta-row">
        <p class="deck-name" id="deck-name"></p>
        <p class="position" id="position"></p>
      </div>

      <button class="study-panel" id="study-panel" aria-label="Flip current flashcard">
        <span class="swipe-side swipe-side-left" aria-hidden="true">Wrong</span>
        <span class="swipe-side swipe-side-right" aria-hidden="true">Right</span>
        <div class="study-face study-face-front" id="front-face">
          <p class="eyebrow" id="front-eyebrow"></p>
          <div class="face-copy">
            <h2 id="front-title"></h2>
            <p id="front-text"></p>
          </div>
        </div>
        <div class="study-face study-face-back" id="back-face" aria-hidden="true">
          <p class="eyebrow" id="back-eyebrow"></p>
          <div class="face-copy">
            <h2 id="back-title"></h2>
            <p id="back-text"></p>
          </div>
        </div>
      </button>

      <nav class="controls" aria-label="Card controls">
        <button id="prev-btn">Prev</button>
        <button id="flip-btn">Flip</button>
        <button id="next-btn">Next</button>
        <button id="shuffle-btn">Shuffle</button>
        <button id="view-toggle-btn">Back First</button>
        <button id="review-mode-btn">Review Mode</button>
        <button id="reset-review-btn">Reset Review</button>
      </nav>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
